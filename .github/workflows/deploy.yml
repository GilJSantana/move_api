name: CI/CD - Build e Publicação na Magalu Cloud

on:
  push:
    branches:
      - main
      - feature/container_registry

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

env:
  MGC_REGION: br-se1
  REGISTRY_NAME: hugo_cr_git_hub
  IMAGE_NAME: move-tech-orders-api
  BUILD_CONTEXT: .
  DOCKERFILE_PATH: ./Dockerfile

jobs:
  build-and-publish:
    name: Validar, construir e publicar imagem
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Definir endereço da imagem
        id: image
        shell: bash
        run: |
          set -euo pipefail

          REGISTRY_HOST="container-registry.${MGC_REGION}.magalu.cloud"
          IMAGE_REPOSITORY="${REGISTRY_HOST}/${REGISTRY_NAME}/${IMAGE_NAME}"

          echo "registry_host=${REGISTRY_HOST}" >> "$GITHUB_OUTPUT"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"

          echo "Registry: ${REGISTRY_HOST}"
          echo "Imagem: ${IMAGE_REPOSITORY}"

      - name: Validar estrutura do projeto
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -d "$BUILD_CONTEXT" ]]; then
            echo "::error::Contexto de build não encontrado: $BUILD_CONTEXT"
            exit 1
          fi

          if [[ ! -f "$DOCKERFILE_PATH" ]]; then
            echo "::error::Dockerfile não encontrado: $DOCKERFILE_PATH"
            exit 1
          fi

          echo "Estrutura do projeto validada."

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Gerar tags e metadados da imagem
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image_repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
            type=ref,event=branch
            type=sha,format=long

      - name: Validar credenciais do Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.MAGALU_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.MAGALU_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${REGISTRY_USERNAME:-}" ]]; then
            echo "::error::O secret MAGALU_REGISTRY_USERNAME não está configurado."
            exit 1
          fi

          if [[ -z "${REGISTRY_PASSWORD:-}" ]]; then
            echo "::error::O secret MAGALU_REGISTRY_PASSWORD não está configurado."
            exit 1
          fi

          echo "Credenciais do Container Registry encontradas."

      - name: Autenticar no Container Registry da Magalu Cloud
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.image.outputs.registry_host }}
          username: ${{ secrets.MAGALU_REGISTRY_USERNAME }}
          password: ${{ secrets.MAGALU_REGISTRY_PASSWORD }}

      - name: Construir e publicar imagem OCI
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo da publicação
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          IMAGE_TAGS: ${{ steps.metadata.outputs.tags }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          {
            echo "## Imagem publicada na Magalu Cloud"
            echo
            echo "### Tags"
            while IFS= read -r tag; do
              [[ -n "$tag" ]] && echo "- \`$tag\`"
            done <<< "$IMAGE_TAGS"
            echo
            echo "### Digest"
            echo "- \`${IMAGE_DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"